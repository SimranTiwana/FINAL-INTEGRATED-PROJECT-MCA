
spring.application.name=quantity-measurement-app

app.security.public-paths=/api/auth/**,/swagger-ui/**,/swagger-ui.html,/v3/api-docs/**,/actuator/health

# =========================================================
# PRODUCTION DATABASE CONFIGURATION
# =========================================================

spring.datasource.url=jdbc:mysql://localhost:3306/quantity_measurement_db

spring.datasource.username=root

spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# JPA / HIBERNATE
# =========================================================

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# =========================================================
# SERVER CONFIGURATION
# =========================================================

server.port=8080

# =========================================================
# LOGGING
# =========================================================

logging.level.root=WARN

logging.level.org.springframework=WARN

logging.level.com.quantity.measurement=INFO

# =========================================================
# ACTUATOR
# =========================================================

management.endpoints.web.exposure.include=health,info,metrics

management.endpoint.health.show-details=never


